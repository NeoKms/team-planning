name: Build & Deploy

on:
  push:
    tags:
      - 'v*'          # Запускать только при появлении тега вида v1.0.0, v2.3.1 и т.д.
  workflow_dispatch:  # Ручной запуск из GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Сборка и публикация Docker-образа в GitHub Container Registry
  # ──────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.push.outputs.digest }}
      image_name: ${{ steps.image_name.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: image_name
        run: echo "value=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_name.outputs.value }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Деплой на сервер по SSH
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            IMAGE="${{ needs.build-and-push.outputs.image_name }}:latest"
            CONTAINER_NAME="team-planning"
            HOST_PORT="${{ secrets.APP_PORT }}"

            echo "==> Logging in to GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            echo "==> Pulling image: $IMAGE"
            docker pull "$IMAGE"

            echo "==> Stopping old container (if exists)..."
            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm   "$CONTAINER_NAME" 2>/dev/null || true

            echo "==> Starting new container..."
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p "${HOST_PORT}:80" \
              "$IMAGE"

            echo "==> Pruning dangling images..."
            docker image prune -f

            echo "==> Deploy complete!"




